<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CreepScore — grade the fine print</title>
<meta name="description" content="Instantly grade any privacy policy or terms of service. Transparent, auditable, 100% in your browser." />
<script>document.documentElement.setAttribute("data-theme", localStorage.getItem("cs-theme") || "dark");</script>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root, [data-theme="dark"] {
    --bg:#0a0b0e; --card:#14161b; --bg2:#1b1e25; --field:#0f1116; --border:#23272f;
    --text:#e9ebf0; --muted:#8a909c; --accent:#818cf8;
    --bad-bg:rgba(244,63,94,.10); --bad-bd:rgba(244,63,94,.28); --bad-tx:#fda4af;
    --good-bg:rgba(16,185,129,.10); --good-bd:rgba(16,185,129,.28); --good-tx:#6ee7b7;
  }
  [data-theme="light"] {
    --bg:#f6f7f9; --card:#ffffff; --bg2:#eef0f3; --field:#fbfbfc; --border:#e7e9ee;
    --text:#0f172a; --muted:#5b6472; --accent:#4f46e5;
    --bad-bg:#fff1f2; --bad-bd:#fecdd3; --bad-tx:#9f1239;
    --good-bg:#f0fdf4; --good-bd:#bbf7d0; --good-tx:#166534;
  }
  html { scroll-behavior: smooth; }
  body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); }
  .display { font-family: "Space Grotesk", Inter, sans-serif; letter-spacing: -0.02em; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; }
  .field { background: var(--field); border: 1px solid var(--border); color: var(--text); }
  .muted { color: var(--muted); }
  .bdr { border-color: var(--border); }
  .fade { animation: fade .3s ease both; }
  @keyframes fade { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  .bar { transition: width .7s cubic-bezier(.2,.8,.2,1); }
  .seg { color: var(--muted); } .seg.active { background: var(--text); color: var(--bg); }
  .tab { color: var(--muted); border-color: transparent; } .tab.active { color: var(--text); border-color: var(--accent); }
  .company { background: var(--card); border: 1px solid var(--border); transition: transform .12s, border-color .12s; }
  .company:hover { transform: translateY(-2px); border-color: var(--accent); }
  .logo { background:#fff; } .logo img { width: 22px; height: 22px; object-fit: contain; }
  .flag { border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
  .flag > summary { list-style: none; cursor: pointer; padding: 11px 13px; display: flex; align-items: center; gap: 10px; }
  .flag > summary::-webkit-details-marker { display: none; }
  .flag[open] > summary { border-bottom: 1px solid var(--border); }
  .flag .chev { transition: transform .15s; color: var(--muted); }
  .flag[open] .chev { transform: rotate(90deg); }
  .flag .evidence { padding: 11px 13px; }
  .flag-bad { background: var(--bad-bg); } .flag-bad .ttl { color: var(--bad-tx); }
  .flag-good { background: var(--good-bg); } .flag-good .ttl { color: var(--good-tx); }
  .ghost { border: 1px solid var(--border); color: var(--muted); } .ghost:hover { color: var(--text); border-color: var(--accent); }
  ::-webkit-scrollbar { height: 9px; width: 9px; } ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 9px; }
</style>
</head>
<body>
  <header class="sticky top-0 z-20 border-b bdr" style="background:color-mix(in srgb, var(--bg) 88%, transparent); backdrop-filter: blur(8px);">
    <div class="max-w-4xl mx-auto px-5 h-14 flex items-center justify-between">
      <button id="home" class="flex items-center gap-2">
        <span class="grid place-items-center w-7 h-7 rounded-lg display font-bold text-sm" style="background:var(--text);color:var(--bg)">C</span>
        <span class="display font-semibold text-lg">CreepScore</span>
      </button>
      <div class="flex items-center gap-3">
        <a href="https://github.com/t3chw1zrd/creepscore" class="text-sm muted hover:opacity-70">GitHub</a>
        <button id="themeToggle" title="Toggle theme" class="w-8 h-8 grid place-items-center rounded-lg ghost">🌙</button>
      </div>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-5 pb-20">

    <!-- ░░ PICK VIEW ░░ -->
    <section id="pickView" class="pt-12">
      <div class="text-center mb-7">
        <h1 class="display text-4xl sm:text-5xl font-bold leading-[1.05]">Is it creepy?</h1>
        <p class="muted mt-3">Grade any company's <b style="color:var(--text)">privacy policy</b> or <b style="color:var(--text)">terms of service</b> — instantly, in your browser.</p>
      </div>

      <input id="search" placeholder="Search 64 companies…" class="field w-full rounded-xl px-4 py-3 text-base focus:outline-none focus:ring-2 focus:ring-indigo-500/30 mb-4" />

      <div class="flex items-center justify-between gap-3 flex-wrap mb-4">
        <div class="flex gap-1 text-sm font-medium">
          <button data-tab="privacy" class="tab active px-1 pb-2 mr-5 border-b-2">Privacy policies</button>
          <button data-tab="tos" class="tab px-1 pb-2 border-b-2">Terms of service</button>
        </div>
        <button id="openPaste" class="text-sm ghost rounded-lg px-3 py-1.5">Paste your own ↗</button>
      </div>

      <div id="gridPrivacy" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5"></div>
      <div id="gridTos" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-2.5 hidden"></div>

      <div class="mt-8 pt-6 border-t bdr text-center">
        <p class="text-sm muted mb-2">Don't see a company you want graded?</p>
        <form id="suggestForm" class="flex gap-2 justify-center max-w-sm mx-auto">
          <input id="suggestInput" placeholder="Suggest a company…" class="field flex-1 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500/30" />
          <button type="submit" class="px-4 py-2 rounded-lg text-white text-sm font-semibold" style="background:var(--accent)">Suggest</button>
        </form>
        <p id="suggestMsg" class="text-xs mt-2 h-4 muted"></p>
      </div>
    </section>

    <!-- ░░ PASTE VIEW ░░ -->
    <section id="pasteView" class="pt-8 hidden">
      <button id="backFromPaste" class="text-sm ghost rounded-lg px-3 py-1.5 mb-5">← Companies</button>
      <h2 class="display text-2xl font-bold mb-1">Paste a document</h2>
      <p class="muted text-sm mb-4">Drop in any privacy policy or terms of service. It's analyzed locally — nothing is uploaded.</p>
      <div class="inline-flex rounded-lg border bdr overflow-hidden text-sm font-medium mb-3">
        <button data-type="auto" class="seg active px-3.5 py-1.5">Auto-detect</button>
        <button data-type="privacy" class="seg px-3.5 py-1.5 border-l bdr">Privacy</button>
        <button data-type="tos" class="seg px-3.5 py-1.5 border-l bdr">Terms</button>
      </div>
      <textarea id="input" rows="9" spellcheck="false"
        class="field w-full rounded-xl p-4 text-sm placeholder:opacity-50 focus:outline-none focus:ring-2 focus:ring-indigo-500/30 resize-y"
        placeholder="Paste the policy text here…"></textarea>
      <div class="flex items-center justify-end gap-2 mt-3">
        <button id="clear" class="px-4 py-2 rounded-lg muted hover:opacity-70 text-sm font-medium">Clear</button>
        <button id="analyze" class="px-5 py-2 rounded-lg text-white font-semibold text-sm" style="background:var(--accent)">Analyze</button>
      </div>
      <p id="error" class="text-rose-400 text-sm mt-3 hidden"></p>
    </section>

    <!-- ░░ RESULT VIEW ░░ -->
    <section id="resultView" class="pt-8 hidden">
      <button id="backFromResult" class="text-sm ghost rounded-lg px-3 py-1.5 mb-5">← Companies</button>
      <div id="results"></div>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
