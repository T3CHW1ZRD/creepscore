<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Augur — forecast with uncertainty</title>
<style>
  :root { --bg:#0e1117; --panel:#161b22; --ink:#e6edf3; --muted:#8b949e; --accent:#d62728; --line:#1f77b4; }
  * { box-sizing: border-box; }
  body { margin:0; font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
         background:var(--bg); color:var(--ink); }
  .wrap { max-width: 920px; margin: 0 auto; padding: 32px 20px 64px; }
  h1 { margin:0 0 4px; font-size: 28px; }
  h1 span { color: var(--accent); }
  p.sub { margin:0 0 24px; color: var(--muted); }
  .panel { background:var(--panel); border:1px solid #21262d; border-radius:12px; padding:20px; margin-bottom:20px; }
  button { background:var(--accent); color:#fff; border:0; padding:11px 20px; border-radius:8px;
           font-size:15px; font-weight:600; cursor:pointer; }
  button:disabled { opacity:.5; cursor:default; }
  .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
  textarea { width:100%; height:70px; background:#0d1117; color:var(--muted); border:1px solid #21262d;
             border-radius:8px; padding:10px; font-family: ui-monospace, monospace; font-size:12px; margin-top:12px; }
  table { width:100%; border-collapse:collapse; margin-top:8px; }
  th, td { padding:8px 10px; text-align:right; border-bottom:1px solid #21262d; font-variant-numeric: tabular-nums; }
  th { color:var(--muted); font-weight:600; }
  td:first-child, th:first-child { text-align:left; }
  .muted { color:var(--muted); font-size:13px; }
  svg { width:100%; height:320px; display:block; }
  .err { color:#f85149; margin-top:10px; }
</style>
</head>
<body>
<div class="wrap">
  <h1>Augur <span>🔮</span></h1>
  <p class="sub">Uncertainty-aware financial forecasting — predicts a calibrated <em>range</em>, not a single number.</p>

  <div class="panel">
    <div class="row">
      <button id="go">Forecast next steps</button>
      <span class="muted" id="status">loading sample history…</span>
    </div>
    <textarea id="history" spellcheck="false"></textarea>
    <div class="err" id="error"></div>
  </div>

  <div class="panel" id="chartPanel" style="display:none">
    <svg id="chart" viewBox="0 0 900 320" preserveAspectRatio="none"></svg>
    <p class="muted" id="legend"></p>
  </div>

  <div class="panel" id="tablePanel" style="display:none">
    <table id="tbl"></table>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
let LOOKBACK = 60;

async function loadSample() {
  try {
    const r = await fetch("/sample");
    const d = await r.json();
    $("history").value = JSON.stringify(d.history);
    LOOKBACK = d.history.length;
    $("status").textContent = `sample loaded (${d.history.length} points) — or paste your own`;
  } catch (e) {
    $("status").textContent = "no /sample (is the API running?)";
  }
}

function drawChart(history, steps, levels) {
  const svg = $("chart");
  const W = 900, H = 320, pad = 30;
  const tail = history.slice(-60);
  const med = steps.map(s => s.quantiles[String(0.5)] ?? s.quantiles[levels[Math.floor(levels.length/2)]]);
  const lo = steps.map(s => s.quantiles[levels[0]]);
  const hi = steps.map(s => s.quantiles[levels[levels.length-1]]);

  const all = tail.concat(lo, hi, med);
  const min = Math.min(...all), max = Math.max(...all);
  const n = tail.length + steps.length;
  const x = (i) => pad + (i*(W-2*pad))/(n-1);
  const y = (v) => H-pad - ((v-min)*(H-2*pad))/((max-min)||1);

  const hist = tail.map((v,i)=>`${x(i)},${y(v)}`).join(" ");
  const off = tail.length-1;
  const medPts = med.map((v,i)=>`${x(off+1+i)},${y(v)}`).join(" ");
  const band = lo.map((v,i)=>`${x(off+1+i)},${y(v)}`).join(" ")
             + " " + hi.map((v,i)=>`${x(off+1+i)},${y(v)}`).reverse().join(" ");
  const connect = `${x(off)},${y(tail[tail.length-1])} ${x(off+1)},${y(med[0])}`;

  svg.innerHTML = `
    <polygon points="${band}" fill="#d62728" fill-opacity="0.18" />
    <polyline points="${hist}" fill="none" stroke="#1f77b4" stroke-width="2" />
    <polyline points="${connect}" fill="none" stroke="#d62728" stroke-width="1.5" stroke-dasharray="3 3" />
    <polyline points="${medPts}" fill="none" stroke="#d62728" stroke-width="2.5" />
    <line x1="${x(off)}" y1="${pad}" x2="${x(off)}" y2="${H-pad}" stroke="#8b949e" stroke-dasharray="4 4" stroke-width="1"/>
  `;
  const band_pct = Math.round((parseFloat(levels[levels.length-1]) - parseFloat(levels[0]))*100);
  $("legend").innerHTML = `<span style="color:#1f77b4">━ history</span> &nbsp; <span style="color:#d62728">━ forecast (median)</span> &nbsp; <span style="color:#d62728">▦ ${band_pct}% prediction interval</span>`;
}

function drawTable(steps, levels) {
  let head = "<tr><th>step</th>" + levels.map(q=>`<th>q${q}</th>`).join("") + "</tr>";
  let rows = steps.map(s => `<tr><td>${s.step}</td>` +
      levels.map(q=>`<td>${(s.quantiles[q]).toFixed(3)}</td>`).join("") + "</tr>").join("");
  $("tbl").innerHTML = head + rows;
}

async function forecast() {
  $("error").textContent = "";
  let history;
  try { history = JSON.parse($("history").value); }
  catch { $("error").textContent = "History must be a JSON array of numbers."; return; }

  $("go").disabled = true; $("status").textContent = "forecasting…";
  try {
    const r = await fetch("/forecast", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ history })
    });
    if (!r.ok) { const e = await r.json(); throw new Error(e.detail || r.statusText); }
    const d = await r.json();
    const levels = d.quantile_levels.map(String);
    drawChart(history, d.steps, levels);
    drawTable(d.steps, levels);
    $("chartPanel").style.display = "block";
    $("tablePanel").style.display = "block";
    $("status").textContent = `forecast ${d.horizon} steps ahead ✓`;
  } catch (e) {
    $("error").textContent = "Error: " + e.message;
    $("status").textContent = "failed";
  } finally { $("go").disabled = false; }
}

$("go").addEventListener("click", forecast);
loadSample();
</script>
</body>
</html>
